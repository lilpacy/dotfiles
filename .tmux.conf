# enable vim
setw -g mode-keys vi

# pipe to pbcopy
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
bind P paste-buffer
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"

# switch pane vim keymapping
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

# resize pane (-r means repeat)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5


# open new pane/window in current directory
bind '"' split-window -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# ===== Catppuccin Frappé モダンUI =====

# true color対応
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",*:RGB"
set -as terminal-features ",xterm-ghostty:RGB"

# Ctrl+Shift+キーの組み合わせをNeovimに渡す（CSI u / kitty keyboard protocol）
set -s extended-keys on
set -as terminal-features 'xterm*:extkeys'

# ステータスバー基本設定
# 背景: Base (#303446), 文字: Text (#c6d0f5)
set -g status-position bottom
set -g status-interval 5
set -g status-justify centre
set -g status-style "bg=#303446,fg=#c6d0f5"

# 左側: セッション名
# 背景: Sapphire (#85c1dc), 文字: Crust (#232634)
set -g status-left-length 40
set -g status-left "#[fg=#232634,bg=#85c1dc,bold]  #S #[fg=#85c1dc,bg=default,nobold]"

# 右側: 時刻
# 日付: Overlay2 (#949cbb), 時刻: Blue (#8caaee)
set -g status-right-length 80
set -g status-right "#[fg=#949cbb]%Y-%m-%d #[fg=#8caaee,bold]%H:%M "

# ウィンドウラベル（ペイン単位で待機中なら⏳を表示）
# アクティブ: Sky (#99d1db), 非アクティブ: Overlay1 (#838ba7)
setw -g window-status-current-format "#[fg=#99d1db,bg=#303446,bold] #I:#W#{?window_zoomed_flag, [Z],}#(~/dotfiles/bin/tmux-claude-indicator '#{window_id}') "
setw -g window-status-format "#[fg=#838ba7,bg=#303446] #I:#W#(~/dotfiles/bin/tmux-claude-indicator '#{window_id}') "

# ペイン境界
# 非アクティブ: Surface0 (#414559), アクティブ: Sapphire (#85c1dc)
set -g pane-border-style "fg=#414559"
set -g pane-active-border-style "fg=#85c1dc"
set -g window-style "bg=default"
set -g window-active-style "bg=default"

# ペインボーダーステータス無効
set -g pane-border-status off

# send focus events to applications (for nvim)
set -g focus-events on

# enable mouse support
set -g mouse on

# auto-focus pane on mouse hover
set -g focus-follows-mouse on

# allow passthrough for image display (image.nvim)
set -g allow-passthrough on

# ===== display-popup keybindings =====

# Prefix + p: previous window
bind-key p previous-window

# Prefix + P (Shift+p): 基本的なポップアップターミナル（90% x 80%、中央）
bind-key P display-popup -E -x C -y C -w 90% -h 80% -d "#{pane_current_path}"

# Prefix + g: lazygit をポップアップで開く
bind-key g display-popup -E -x C -y C -w 95% -h 95% -d "#{pane_current_path}" "lazygit"

# Prefix + s: lazysql をポップアップで開く
bind-key s display-popup -E -x C -y C -w 95% -h 95% -d "#{pane_current_path}" "lazysql"

# Prefix + v: nvim をポップアップで開く
bind-key v display-popup -E -x C -y C -w 95% -h 95% -d "#{pane_current_path}" "nvim"

# Prefix + t: top をポップアップで開く
bind-key t display-popup -E -x C -y C -w 90% -h 80% "top"

# Prefix + f: fzfファイル検索をポップアップで開く（選択したファイルをエディタで開く）
bind-key f display-popup -E -x C -y C -w 90% -h 80% -d "#{pane_current_path}" "nvim \$(fzf)"

# Prefix + D: 開発用4ペインレイアウト作成（現在のウィンドウ内）
bind-key D run-shell "~/dotfiles/bin/tmux-dev-layout"

# Prefix + E: 開発用5ペインレイアウト（上3等分+下6:4）
bind-key E run-shell "~/dotfiles/bin/tmux-dev-layout2"

# ===== Custom right-click pane menu (add Swap Left/Right) =====
bind-key -n MouseDown3Pane if-shell -F -t = "#{||:#{mouse_any_flag},#{&&:#{pane_in_mode},#{?#{m/r:(copy|view)-mode,#{pane_mode}},0,1}}}" { select-pane -t =; send-keys -M } { display-menu -t = -xM -yM -T "#[align=centre]#{pane_index} (#{pane_id})" \
  "#{?#{m/r:(copy|view)-mode,#{pane_mode}},Go To Top,}" < { send-keys -X history-top } \
  "#{?#{m/r:(copy|view)-mode,#{pane_mode}},Go To Bottom,}" > { send-keys -X history-bottom } \
  '' \
  "#{?mouse_word,Search For #[noitalics]\"#{=/9/...:mouse_word}\",}" C-r { if-shell -F "#{?#{m/r:(copy|view)-mode,#{pane_mode}},0,1}" "copy-mode -t="; send-keys -X -t = search-backward "#{q:mouse_word}" } \
  "#{?mouse_word,Type #[noitalics]\"#{=/9/...:mouse_word}\",}" "!" { send-keys "#{q:mouse_word}" } \
  "#{?mouse_line,Type #[noitalics]\"#{=/9/...:mouse_line}\",}" "(" { send-keys "#{q:mouse_line}" } \
  '' \
  "#{?mouse_hyperlink,Type #[noitalics]\"#{=/9/...:mouse_hyperlink}\",}" ")" { send-keys "#{q:mouse_hyperlink}" } \
  "#{?mouse_hyperlink,Open #[noitalics]\"#{=/9/...:mouse_hyperlink}\",}" O { run-shell "open \"#{q:mouse_hyperlink}\" || xdg-open \"#{q:mouse_hyperlink}\"" } \
  '' \
  "Paste" p { paste-buffer } \
  '' \
  "Copy Line" l { copy-mode; send-keys -X select-line; send-keys -X copy-pipe-and-cancel } \
  '' \
  "Horizontal Split" h { split-window -h -c "#{pane_current_path}" } \
  "Vertical Split" v { split-window -v -c "#{pane_current_path}" } \
  '' \
  "Swap Up" u { swap-pane -U } \
  "Swap Down" d { swap-pane -D } \
  "#{?pane_marked_set,,-}Swap Marked" s { swap-pane } \
  '' \
  "Swap Left" "{" { swap-pane -t "{left-of}" } \
  "Swap Right" "}" { swap-pane -t "{right-of}" } \
  '' \
  "Kill" X { kill-pane } \
  "Respawn" R { respawn-pane -k } \
  "Mark" m { select-pane -m } \
  "Zoom" z { resize-pane -Z } }

# ===== Claude Code waiting flag 初期化 =====
# 新しいペイン/ウィンドウ作成時に@claude_waitingを0に初期化
set-hook -g after-split-window 'set -p @claude_waiting 0; set -p @claude_working 0'
set-hook -g after-new-window 'set -p @claude_waiting 0; set -p @claude_working 0'

# ===== Window state save/restore =====
# Auto-save on window changes (--auto checks @window_state_restoring guard)
set-hook -g window-renamed 'run-shell -b "~/dotfiles/bin/tmux-save-windows --auto"'
set-hook -g window-unlinked 'run-shell -b "~/dotfiles/bin/tmux-save-windows --auto"'
set-hook -g client-detached 'run-shell -b "~/dotfiles/bin/tmux-save-windows --auto"'
# Auto-restore on session creation (--auto checks @window_state_restored guard)
set-hook -g session-created 'run-shell -b "~/dotfiles/bin/tmux-restore-windows --auto"'
# Manual keybindings
bind-key W run-shell "~/dotfiles/bin/tmux-save-windows"
bind-key R run-shell "~/dotfiles/bin/tmux-restore-windows"
